- name: "Configure Docker daemon"
  ansible.builtin.copy:
    src: "docker/daemon.json"
    dest: "/etc/docker/daemon.json"
    mode: "0644"

- name: "Create Docker systemd directory"
  ansible.builtin.file:
    path: "{{ systemd.path }}/system/docker.service.d"
    state: "directory"
    recurse: true

- name: "Override Docker service launch options"
  ansible.builtin.copy:
    src: "docker/override.conf"
    dest: "{{ systemd.path }}/system/docker.service.d/override.conf"
    mode: "0644"
  register: "docker_override"

- name: "Restart Docker service"
  ansible.builtin.systemd_service:
    name: "docker"
    state: "restarted"
    enabled: true
    daemon_reload: true
  when: "docker_override.changed"

- name: "Create Docker compose directory"
  ansible.builtin.file:
    path: "{{ docker_directory }}"
    state: "directory"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"

- name: "Generate variables.env file for Docker Compose"
  ansible.builtin.template:
    src: "docker/variables.env.j2"
    dest: "{{ docker_directory }}/variables.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    variables: "{{ docker.variables }}"

- name: "Generate secrets.env file for Docker Compose"
  ansible.builtin.template:
    src: "docker/variables.env.j2"
    dest: "{{ docker_directory }}/secrets.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  vars:
    variables: "{{ secrets.docker }}"
  no_log: true

- name: "Generate Docker Compose stack definition"
  ansible.builtin.template:
    src: "docker/compose.yml.j2"
    dest: "{{ docker_directory }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
