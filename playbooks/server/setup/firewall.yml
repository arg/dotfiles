- name: "Configure firewall (ports)"
  community.general.ufw:
    rule: "allow"
    port: "{{ item }}"
    proto: "tcp"
    from_ip: "192.168.0.0/24"
  loop: "{{ firewall.ports }}"
  register: "firewall_ports"

- name: "Configure firewall (services)"
  community.general.ufw:
    rule: "allow"
    name: "{{ item }}"
    from_ip: "192.168.0.0/24"
  loop: "{{ firewall.services }}"
  register: "firewall_services"

- name: "Enable firewall"
  community.general.ufw:
    state: "enabled"
    default: "deny"
  when: "firewall_ports.changed or firewall_services.changed"
