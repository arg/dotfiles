- name: "Configure firewall (ports)"
  community.general.ufw:
    rule: "allow"
    port: "{{ item }}"
    proto: "tcp"
    from_ip: "192.168.0.0/24"
  loop: "{{ ufw.ports }}"
  register: "ufw_ports"

- name: "Configure firewall (services)"
  community.general.ufw:
    rule: "allow"
    name: "{{ item }}"
    from_ip: "192.168.0.0/24"
  loop: "{{ ufw.services }}"
  register: "ufw_services"

- name: "Enable firewall"
  community.general.ufw:
    state: "enabled"
    default: "deny"
  when: "ufw_ports.changed or ufw_services.changed"
