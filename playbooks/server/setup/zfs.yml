- name: "Check for a usable TPM2"
  ansible.builtin.command: "systemd-analyze has-tpm2"
  register: "tpm2_check"
  changed_when: false
  failed_when: "'yes' not in tpm2_check.stdout"

- name: "Ensure the encrypted credstore directory exists"
  ansible.builtin.file:
    path: "{{ zfs.encrypted_credentials_directory }}"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "0700"

- name: "Check whether the credential is already sealed"
  ansible.builtin.stat:
    path: "{{ encrypted_credential_full_path }}"
  register: "zfs_vault_credential"

- name: "Prompt for the ZFS vault passphrase"
  ansible.builtin.pause:
    prompt: "ZFS vault passphrase"
    echo: false
  register: "zfs_vault_prompt"
  no_log: true
  when: "not zfs_vault_credential.stat.exists"

- name: "Seal the passphrase with TPM2"
  ansible.builtin.command:
    cmd: "systemd-creds encrypt --name={{ encrypted_credential_file }} --with-key=host+tpm2 - {{ encrypted_credential_full_path }}"
    stdin: "{{ zfs_vault_prompt.user_input }}"
    stdin_add_newline: false
  no_log: true
  when: "not zfs_vault_credential.stat.exists"

- name: "Set permissions for the sealed credential"
  ansible.builtin.file:
    path: "{{ encrypted_credential_full_path }}"
    owner: "root"
    group: "root"
    mode: "0600"

- name: "Install unlock script"
  ansible.builtin.template:
    src: "zfs/unlock-zfs-vault.sh.j2"
    dest: "{{ scripts_directory }}/unlock-zfs-vault.sh"
    owner: "root"
    group: "root"
    mode: "0755"

- name: "Install systemd service"
  ansible.builtin.template:
    src: "zfs/unlock-zfs-vault.service.j2"
    dest: "{{ systemd.path }}/system/unlock-zfs-vault.service"
    owner: "root"
    group: "root"
    mode: "0644"
  register: "unlock_zfs_service"

- name: "Enable systemd service"
  ansible.builtin.systemd_service:
    name: "unlock-zfs-vault.service"
    enabled: true
    daemon_reload: true
  when: "unlock_zfs_service.changed"
