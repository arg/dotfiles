all:
  hosts:
    sirius:
      ansible_host: "192.188.0.5"
    polaris:
      ansible_host: "192.168.0.6"
  children:
    servers:
      hosts:
        polaris:
      vars:
        ansible_user: "arg"
        additional_users:
          - "veronika"
        dotfiles_dir: "/home/arg/.dotfiles"
        systemd:
          path: "/usr/lib/systemd"
          journal_size: "2G"
        zswap_percent: "15"
        sysctl_vars:
          - name: "vm.swappiness"
            value: "10"
        apt_cache_valid_time: 86400 # 24 hours
        packages:
          install:
            - "fish"
            - "fzf"
            - "git"
            - "neovim"
            - "htop"
            - "mc"
            - "tmux"
            - "build-essential"
            - "rsyslog-gnutls"
            - "nfs-kernel-server"
            - "rclone"
            - "curl"
            - "wget"
            - "docker.io"
            - "docker-compose-v2"
            - "vifm"
            - "nvme-cli"
            - "zram-tools"
            - "drm-info"
            - "bluez"
            - "dbus-broker"
          remove:
            - "snapd"
        ufw:
          ports:
            - 80 # HTTP
            - 443 # HTTPS
            - 2049 # NFSv4
          services:
            - "OpenSSH"
    ipmi_hosts:
      hosts:
        sirius:
      vars:
        ansible_user: "ADMIN"
    docker_hosts:
      hosts:
        polaris:
      vars:
        ansible_user: "arg"
